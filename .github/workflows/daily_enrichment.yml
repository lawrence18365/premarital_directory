name: Daily Automated Outreach
on:
  # Schedule disabled - these scripts are in scripts/outreach/ not repo root
  # schedule:
  #   - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      skip_enrichment:
        description: 'Skip email finding (only send existing ready_to_email)'
        required: false
        default: 'false'

jobs:
  automated-outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Find Emails (Enrichment)
        if: github.event.inputs.skip_enrichment != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          echo "🔍 Finding new emails..."
          python enrichment_engine.py || echo "⚠️ Enrichment failed, continuing with existing emails..."

      - name: Send Emails Automatically via Resend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          echo "📧 Sending emails to all ready_to_email profiles..."
          python auto_send_emails.py

      - name: Summary
        run: |
          echo "✅ Daily automated outreach complete!"
          echo "📊 Check logs above for results"
