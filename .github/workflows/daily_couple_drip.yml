name: Daily Couple Drip Emails
on:
  schedule:
    - cron: '15 15 * * *'  # 3:15 PM UTC (10:15 AM ET) — staggered from officiant outreach at 3 PM
  workflow_dispatch:

jobs:
  send-couple-drip:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send couple drip emails
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/send-couple-drip" \
            -H "Content-Type: application/json" \
            -H "x-internal-api-key: ${{ secrets.INTERNAL_API_KEY }}" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Couple drip failed with status $HTTP_CODE"
            exit 1
          fi
