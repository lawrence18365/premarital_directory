name: Daily Google Indexing

# DISABLED 2026-05-17.
# Google's Indexing API is officially only for JobPosting / BroadcastEvent.
# Daily runs were burning the 200/day quota AND submitting URLs Google had
# already rejected (89% of submissions returning 429 RESOURCE_EXHAUSTED).
# Per project rule: never use the Indexing API on counselor profile pages.
# Keeping the file so it can be re-enabled later with workflow_dispatch only.

on:
  # schedule: cron disabled — re-enable only if you re-scope this workflow
  #   to JobPosting URLs only.
  # - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Indexing mode'
        required: true
        default: 'ping-sitemap'
        type: choice
        options:
          - ping-sitemap
          - claimed
          - new-profiles
          - priority
          - sitemap
          - important
          - blog

jobs:
  index-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Step 0: Always ping sitemap (safe, compliant, recommended)
      - name: Ping Google & Bing to re-crawl sitemap
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'ping-sitemap'
        run: node scripts/ga/auto-index.js --ping-sitemap

      # Step 0.5: Always re-submit claimed (real user) profiles — these are gold
      - name: Submit claimed profiles to Indexing API
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'claimed'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ga/auto-index.js --claimed

      # Step 1: Submit new/claimed profiles (daily)
      - name: Submit new profiles to Indexing API
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'new-profiles'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ga/auto-index.js --new-profiles

      # Step 1b: Submit blog posts (daily, uses ~40 quota)
      - name: Submit blog posts to Indexing API
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'blog'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ga/auto-index.js --blog

      # Step 1c: Submit important pages (city, state, specialty — daily, uses ~50 quota)
      - name: Submit important pages to Indexing API
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'important'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ga/auto-index.js

      # Step 2: On scheduled runs, also submit priority non-indexed URLs
      # (uses remaining daily quota after new profiles)
      - name: Submit priority non-indexed URLs
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'priority'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # First generate a fresh coverage sample to identify non-indexed URLs
          node scripts/ga/index-coverage-report.js --profiles --sample 50 || true
          # Then submit priority URLs using remaining quota
          node scripts/ga/auto-index.js --priority || echo "No priority URLs to submit"

      # Manual modes
      - name: Submit from sitemap
        if: github.event.inputs.mode == 'sitemap'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ga/auto-index.js --sitemap

      - name: Submit important pages
        if: github.event.inputs.mode == 'important'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ga/auto-index.js
