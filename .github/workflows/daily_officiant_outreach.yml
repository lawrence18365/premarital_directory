name: Daily Officiant Outreach

on:
  schedule:
    - cron: '0 15 * * *' # 3 PM UTC / 10 AM ET daily
  workflow_dispatch: # Manual trigger for testing

jobs:
  send-officiant-outreach:
    runs-on: ubuntu-latest
    steps:
      - name: Send officiant outreach batch
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/send-officiant-outreach" \
            -H "Content-Type: application/json" \
            -H "x-internal-api-key: ${{ secrets.INTERNAL_API_KEY }}" \
            -d '{}')

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Officiant outreach function returned $http_code"
            exit 1
          fi
