name: Daily SEO Sitemap Ping

on:
  schedule:
    # Run at 8:00 AM UTC (3:00 AM EST) every day
    - cron: '0 8 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  ping-search-engines:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Google with updated sitemap
        run: |
          echo "Pinging Google Search Console with sitemap..."
          curl -sI "https://www.google.com/ping?sitemap=https://www.weddingcounselors.com/sitemap.xml"
          echo ""
          echo "Pinging Bing with sitemap..."
          curl -sI "https://www.bing.com/ping?sitemap=https://www.weddingcounselors.com/sitemap.xml"
          echo ""
          echo "Sitemap pings sent successfully."
