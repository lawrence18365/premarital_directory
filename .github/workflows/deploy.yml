name: Build, Prerender & Deploy

# This workflow builds the CRA app, pre-renders SEO pages using Puppeteer
# (Chrome is pre-installed on GitHub Actions runners), and deploys the
# static HTML bundle to Vercel.
#
# To stay within free-tier limits (GitHub Actions + Vercel):
# - push runs: build-only (no prerender, no deploy) — validates compilation
# - schedule runs (Mon & Thu): full prerender + deploy with incremental caching
# - manual runs: full prerender + deploy (use for immediate updates)
#
# Why GitHub Actions instead of Vercel's build?
# Vercel's build containers cannot run headless Chrome, so the Puppeteer
# prerender step silently fails there. GitHub Actions runners have Chrome
# pre-installed, making prerendering reliable.

on:
  push:
    branches: [main]
  schedule:
    # Rebuild twice a week (Mon & Thu at 5 AM UTC) to pick up new profiles
    # while staying well within GitHub Actions free-tier minutes
    - cron: '0 5 * * 1,4'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual rebuild'

# Cancel in-progress runs on the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Push runs: skip prerender entirely (no deploy happens, so prerender is wasted minutes).
      # Schedule/manual runs: full prerender + deploy.
      SKIP_PRERENDER: ${{ github.event_name == 'push' }}
      PRERENDER_INCLUDE_PROFILES: ${{ github.event_name != 'push' }}
      SHOULD_DEPLOY_VERCEL: ${{ github.event_name != 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix client

      # Split build into separate steps so we can inject the prerender cache
      # between the webpack build and prerender. CRA wipes build/ on each run,
      # so we must restore cached HTML after webpack finishes.

      - name: Generate sitemaps
        run: node scripts/generate-sitemap.js
        working-directory: client
        env:
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}

      - name: Webpack build (CRA)
        run: npx react-scripts build
        working-directory: client
        # Note: running react-scripts directly (not `npm run build`) to skip
        # pre/postbuild hooks — we handle sitemap + prerender as separate steps.
        env:
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
          REACT_APP_SITE_URL: https://www.weddingcounselors.com
          REACT_APP_SITE_NAME: Wedding Counselors
          REACT_APP_SITE_DESCRIPTION: "Find premarital & marriage counselors near you. Compare licensed therapists, Christian counselors & clergy."
          REACT_APP_GOOGLE_SITE_VERIFICATION: ${{ secrets.REACT_APP_GOOGLE_SITE_VERIFICATION }}
          REACT_APP_BING_VERIFICATION: ${{ secrets.REACT_APP_BING_VERIFICATION }}
          REACT_APP_GA4_MEASUREMENT_ID: ${{ secrets.REACT_APP_GA4_MEASUREMENT_ID }}
          REACT_APP_FACEBOOK_PIXEL_ID: ${{ secrets.REACT_APP_FACEBOOK_PIXEL_ID }}
          REACT_APP_GOOGLE_ADS_ID: ${{ secrets.REACT_APP_GOOGLE_ADS_ID }}
          CI: true

      # Restore cached prerendered HTML from the last successful deploy.
      # The prerender script skips routes whose HTML already exists, so
      # only NEW pages get rendered — cutting run time dramatically.
      - name: Restore prerender cache
        if: env.SKIP_PRERENDER != 'true'
        uses: actions/cache@v4
        with:
          path: client/.prerender-cache
          key: prerender-${{ runner.os }}-${{ hashFiles('client/scripts/prerender.js') }}
          restore-keys: |
            prerender-${{ runner.os }}-

      - name: Copy cached prerendered pages into build
        if: env.SKIP_PRERENDER != 'true'
        run: |
          if [ -d client/.prerender-cache ]; then
            CACHED=$(find client/.prerender-cache -name "index.html" -type f | wc -l)
            echo "Restoring $CACHED cached prerendered pages"
            cp -rn client/.prerender-cache/* client/build/ 2>/dev/null || true
          else
            echo "No prerender cache found — full prerender will run"
          fi

      - name: Prerender SEO pages
        if: env.SKIP_PRERENDER != 'true'
        run: node scripts/prerender.js
        working-directory: client
        env:
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
          CI: true

      - name: Update prerender cache
        if: env.SKIP_PRERENDER != 'true'
        run: |
          rm -rf client/.prerender-cache
          mkdir -p client/.prerender-cache
          # Cache only prerendered subdirectories (not static assets — those change every build)
          for dir in premarital-counseling about blog contact features pricing support; do
            if [ -d "client/build/$dir" ]; then
              cp -r "client/build/$dir" "client/.prerender-cache/$dir"
            fi
          done
          CACHED=$(find client/.prerender-cache -name "index.html" -type f | wc -l)
          echo "Cached $CACHED prerendered pages for next run"

      # Quick sanity check: verify a profile page was actually prerendered
      - name: Verify prerender output
        run: |
          echo "=== Prerender Verification ==="
          echo "SKIP_PRERENDER=$SKIP_PRERENDER"
          echo "PRERENDER_INCLUDE_PROFILES=$PRERENDER_INCLUDE_PROFILES"

          # Push runs skip prerender entirely — just verify the build succeeded
          if [ "$SKIP_PRERENDER" = "true" ]; then
            if [ -f client/build/index.html ]; then
              echo "Build output exists. Prerender skipped (push run, no deploy)."
              echo "=== Verification passed (build-only) ==="
            else
              echo "::error::Build output missing!"
              exit 1
            fi
            exit 0
          fi

          # In lean mode (push deploys), we intentionally skip profile prerendering.
          if [ "$PRERENDER_INCLUDE_PROFILES" != "true" ]; then
            NON_ROOT_PAGES=$(find client/build -mindepth 2 -name "index.html" -type f 2>/dev/null | head -5)
            if [ -z "$NON_ROOT_PAGES" ]; then
              echo "::error::No nested prerendered SEO pages found in lean mode."
              exit 1
            fi
            echo "Lean-mode sample prerendered pages:"
            echo "$NON_ROOT_PAGES"
            echo "=== Verification passed (lean mode) ==="
            exit 0
          fi

          # Check that profile directories exist
          PROFILE_DIRS=$(find client/build/premarital-counseling -mindepth 4 -name "index.html" -type f 2>/dev/null | head -5)
          if [ -z "$PROFILE_DIRS" ]; then
            echo "::error::No prerendered profile pages found! Prerender may have failed."
            exit 1
          fi

          echo "Sample prerendered profiles:"
          echo "$PROFILE_DIRS"

          # Check that one of them has actual content (not just the SPA shell)
          SAMPLE=$(echo "$PROFILE_DIRS" | head -1)
          SAMPLE_SIZE=$(wc -c < "$SAMPLE")
          echo "Sample file size: $SAMPLE_SIZE bytes"

          if [ "$SAMPLE_SIZE" -lt 5000 ]; then
            echo "::error::Prerendered file is too small ($SAMPLE_SIZE bytes). Likely just the SPA shell."
            exit 1
          fi

          # Check for a custom title (not the generic fallback)
          if grep -q '<title>Wedding Counselors</title>' "$SAMPLE"; then
            echo "::error::Sample page has generic title 'Wedding Counselors' — SEOHelmet did not set profile-specific title"
            exit 1
          else
            TITLE=$(grep -oP '<title>\K[^<]+' "$SAMPLE" | head -1)
            echo "Title: $TITLE"
          fi

          # Check for JSON-LD structured data
          JSONLD_COUNT=$(grep -c 'application/ld+json' "$SAMPLE" || true)
          echo "JSON-LD blocks: $JSONLD_COUNT"

          echo "=== Verification passed ==="

      # Prepare the Vercel prebuilt output directory structure
      - name: Prepare Vercel output
        if: env.SHOULD_DEPLOY_VERCEL == 'true'
        run: |
          mkdir -p .vercel/output/static
          cp -r client/build/* .vercel/output/static/
          STATIC_FILE_COUNT=$(find .vercel/output/static -type f | wc -l)
          echo "Static files in .vercel/output/static: $STATIC_FILE_COUNT"
          echo "STATIC_FILE_COUNT=$STATIC_FILE_COUNT" >> $GITHUB_ENV

          cat > .vercel/output/config.json << 'VCONFIG'
          {
            "version": 3,
            "routes": [
              {
                "src": "/(.*)/",
                "headers": { "Location": "/$1" },
                "status": 308
              },
              {
                "src": "/therapists",
                "headers": { "Location": "/" },
                "status": 301
              },
              {
                "src": "/coaches",
                "headers": { "Location": "/" },
                "status": 301
              },
              {
                "src": "/clergy",
                "headers": { "Location": "/" },
                "status": 301
              },
              {
                "src": "/profile/(.*)",
                "headers": { "X-Robots-Tag": "noindex, follow" },
                "continue": true
              },
              {
                "src": "/static/(.*)",
                "headers": { "Cache-Control": "public, max-age=31536000, immutable" },
                "continue": true
              },
              {
                "src": "/(sitemap.*\\.xml|robots\\.txt)",
                "headers": { "Cache-Control": "public, max-age=3600" },
                "continue": true
              },
              {
                "src": "/(.*)",
                "headers": {
                  "X-Content-Type-Options": "nosniff",
                  "Referrer-Policy": "strict-origin-when-cross-origin"
                },
                "continue": true
              },
              {
                "handle": "filesystem"
              },
              {
                "src": "/auth/v1/(.*)",
                "dest": "https://bkjwctlolhoxhnoospwp.supabase.co/auth/v1/$1"
              },
              {
                "src": "/(.*)",
                "dest": "/index.html"
              }
            ]
          }
          VCONFIG

      - name: Deploy to Vercel
        if: env.SHOULD_DEPLOY_VERCEL == 'true'
        run: npx vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Skip deploy on push
        if: env.SHOULD_DEPLOY_VERCEL != 'true'
        run: |
          echo "Skipping Vercel deploy on push to avoid free-tier upload throttling."
          echo "Use workflow_dispatch (manual run) for immediate deploy."

      - name: Summary
        if: always()
        run: |
          PROFILE_COUNT=$(find client/build/premarital-counseling -mindepth 4 -name "index.html" -type f 2>/dev/null | wc -l)
          TOTAL_HTML=$(find client/build -name "index.html" -type f | wc -l)
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Total prerendered pages:** $TOTAL_HTML" >> $GITHUB_STEP_SUMMARY
          echo "- **Prerendered profiles:** $PROFILE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile prerender mode:** $PRERENDER_INCLUDE_PROFILES" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy attempted:** $SHOULD_DEPLOY_VERCEL" >> $GITHUB_STEP_SUMMARY
          echo "- **Static files uploaded:** ${STATIC_FILE_COUNT:-unknown}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "- **Reason:** ${{ github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          fi
